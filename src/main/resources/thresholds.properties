# Alert thresholds for the smart-farm monitoring system.
# Values are loaded once at process start by util.ThresholdConfig.
# Missing keys fall back to the hard-coded defaults in that class
# (the values below match those fallbacks).
#
# Edit and rebuild for desktop; for an Android release the same file
# ships inside the APK's classpath, so the defaults travel with the
# build and can be overridden by replacing this resource.

# Temperature thresholds (°C)
temp.critical.high = 35.0
temp.warning.high  = 30.0
temp.critical.low  = 5.0

# Humidity thresholds (%)
hum.warning.low  = 30.0
hum.warning.high = 85.0

# Soil moisture thresholds (%) — FC-28 sensor
soil.critical.dry = 20.0
soil.warning.dry  = 30.0
soil.warning.wet  = 85.0
