# Builds the Android APK using Gluon Mobile (GluonFX) as planned in
# ANDROID_MIGRATION.md. Aligned with:
#   §2  — target stack: GluonFX + GraalVM Substrate
#   §5  — Phase 0 prereqs: GraalVM, Android SDK/NDK, Java 17
#   §8.A H1 — Maven profile `android` exposes the gluonfx:build / gluonfx:package goals
#   §8.A H4 — DBConnection reads DB_URL / DB_USER / DB_PASSWORD env vars
#
# IMPORTANT: This workflow will fail until Hagag's H1 task lands `gluonfx-maven-plugin`
# in pom.xml. The "Verify android profile" step prints a clear message if it's missing,
# so it is safe to commit the workflow now and let the migration catch up.

name: Build Android APK

on:
  push:
    branches: [mobile-app, main]
    paths:
      - 'pom.xml'
      - 'src/main/**'
      - 'src/android/**'
      - '.github/workflows/android.yml'
  pull_request:
    branches: [mobile-app, main]
    paths:
      - 'pom.xml'
      - 'src/main/**'
      - 'src/android/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

env:
  MAVEN_OPTS: "-Xmx4g -Dfile.encoding=UTF-8"
  GLUON_TARGET: aarch64-android

jobs:
  build-apk:
    name: Build APK (aarch64-android)
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      # Evaluated once for the whole job — used to skip the signing step
      # when the keystore secret isn't configured (e.g. on forks).
      HAS_KEYSTORE: ${{ secrets.GLUON_ANDROID_KEYSTORE_BASE64 != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GraalVM built by Gluon — guarantees the native-image / Substrate
      # version GluonFX expects. After this step JAVA_HOME and GRAALVM_HOME
      # both point at the installed GraalVM.
      - name: Set up GraalVM (Gluon distribution)
        uses: gluonhq/setup-graalvm@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Native dependencies GluonFX needs to compile JavaFX + media + GTK
      # bindings during the AOT step on Linux.
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libgl-dev \
            libgtk-3-dev \
            libpango1.0-dev \
            libxtst-dev

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-android-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-android-
            ${{ runner.os }}-maven-

      # GluonFX downloads the Android SDK + NDK on first run into ~/.gluon
      # (~2 GB). Caching it cuts subsequent CI runs from ~45 min to ~25 min.
      - name: Cache Gluon Substrate (Android SDK/NDK)
        uses: actions/cache@v4
        with:
          path: |
            ~/.gluon
            ~/.gradle/caches
          key: ${{ runner.os }}-gluon-substrate-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-gluon-substrate-

      # Sanity check — surfaces a friendly error if H1 isn't merged yet
      # instead of dumping a confusing Maven goal-not-found stacktrace.
      - name: Verify android profile is wired up
        run: |
          if ! grep -q "gluonfx-maven-plugin" pom.xml; then
            echo "::error file=pom.xml::pom.xml does not contain gluonfx-maven-plugin yet."
            echo "::error::See ANDROID_MIGRATION.md §8.A task H1 — Hagag must add the plugin and the 'android' Maven profile before this workflow can produce an APK."
            exit 1
          fi
          if ! grep -qE "<id>\s*android\s*</id>" pom.xml; then
            echo "::error file=pom.xml::pom.xml is missing the <profile><id>android</id> block."
            echo "::error::See ANDROID_MIGRATION.md §8.A task H1."
            exit 1
          fi

      # Decode the upload-signing keystore from a base64 repo secret.
      # Skipped when the secret is empty — GluonFX then falls back to its
      # built-in debug keystore so the APK still builds for testing.
      - name: Decode signing keystore
        id: keystore
        if: env.HAS_KEYSTORE == 'true'
        uses: timheuer/base64-to-file@v1
        with:
          fileName: 'agrilliant-upload.keystore'
          encodedString: ${{ secrets.GLUON_ANDROID_KEYSTORE_BASE64 }}

      # AOT compile JavaFX → native ARM64 Android binary via GraalVM Substrate.
      # This is the slow step (15–35 min on a fresh cache).
      - name: GluonFX build (native image)
        run: mvn -B -ntp -Pandroid gluonfx:build
        env:
          # DBConnection looks for these first; see util/DBConnection.java and
          # ANDROID_MIGRATION.md §3 (acknowledged risk: JDBC-from-phone).
          DB_URL: ${{ secrets.DB_URL }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          # Plant.id key, optional — only the disease-detection screen needs it.
          PLANT_ID_API_KEY: ${{ secrets.PLANT_ID_API_KEY }}

      # Package the native image into an APK (and AAB). Reads keystore env
      # vars when present; otherwise produces a debug-signed APK.
      - name: GluonFX package (APK / AAB)
        run: mvn -B -ntp -Pandroid gluonfx:package
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          PLANT_ID_API_KEY: ${{ secrets.PLANT_ID_API_KEY }}
          GLUON_ANDROID_KEYSTOREPATH: ${{ steps.keystore.outputs.filePath }}
          GLUON_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.GLUON_ANDROID_KEYSTORE_PASSWORD }}
          GLUON_ANDROID_KEYALIAS: ${{ secrets.GLUON_ANDROID_KEYALIAS }}
          GLUON_ANDROID_KEYALIAS_PASSWORD: ${{ secrets.GLUON_ANDROID_KEYALIAS_PASSWORD }}

      - name: List build output
        if: always()
        run: |
          echo "── target/gluonfx ──"
          ls -lah target/gluonfx/aarch64-android/gvm/ || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: agrilliant-apk-${{ github.sha }}
          path: target/gluonfx/aarch64-android/gvm/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload AAB (if produced)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agrilliant-aab-${{ github.sha }}
          path: target/gluonfx/aarch64-android/gvm/*.aab
          if-no-files-found: ignore
          retention-days: 14

      # Diagnostic dump for the inevitable first runs that fail on a
      # missing GraalVM reflection entry — see ANDROID_MIGRATION.md §M6.
      - name: Upload native-image logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: native-image-logs-${{ github.sha }}
          path: |
            target/gluonfx/aarch64-android/gvm/log/
            target/gluonfx/aarch64-android/gvm/Agrilliant/build.log
          if-no-files-found: ignore
          retention-days: 7
