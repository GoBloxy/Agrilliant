name: Build Installers

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  JAVAFX_VERSION: "21.0.2"

jobs:
  # ── Windows .exe ──
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Download JavaFX jmods (Windows)
        run: |
          curl -L -o javafx-jmods.zip "https://download2.gluonhq.com/openjfx/${{ env.JAVAFX_VERSION }}/openjfx-${{ env.JAVAFX_VERSION }}_windows-x64_bin-jmods.zip"
          Expand-Archive javafx-jmods.zip -DestinationPath javafx-jmods

      - name: Create mqtt.properties from secret
        run: |
          Set-Content -Path src/main/resources/mqtt.properties -Value "${{ secrets.MQTT_PROPERTIES }}"

      - name: Create db.properties from secret
        run: |
          Set-Content -Path src/main/resources/db.properties -Value "${{ secrets.DB_PROPERTIES }}"

      - name: Build JAR
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: mvn clean package -DskipTests

      - name: Package as .exe
        run: |
          jpackage `
            --input target `
            --main-jar smart-farm-1.0-SNAPSHOT.jar `
            --main-class smartfarm.Launcher `
            --name "Agrilliant" `
            --type exe `
            --dest dist `
            --vendor "Agrilliant" `
            --app-version 1.0.0 `
            --icon src/main/resources/images/logo.png `
            --module-path "javafx-jmods/javafx-jmods-${{ env.JAVAFX_VERSION }}" `
            --add-modules javafx.controls,javafx.fxml,java.sql `
            --win-shortcut `
            --win-menu

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: agrilliant-windows-exe
          path: dist/*.exe

  # ── Linux binary ──
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Download JavaFX jmods (Linux)
        run: |
          curl -L -o javafx-jmods.zip "https://download2.gluonhq.com/openjfx/${{ env.JAVAFX_VERSION }}/openjfx-${{ env.JAVAFX_VERSION }}_linux-x64_bin-jmods.zip"
          unzip javafx-jmods.zip -d javafx-jmods

      - name: Create mqtt.properties from secret
        run: echo "${{ secrets.MQTT_PROPERTIES }}" > src/main/resources/mqtt.properties

      - name: Create db.properties from secret
        run: echo "${{ secrets.DB_PROPERTIES }}" > src/main/resources/db.properties

      - name: Build JAR
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: mvn clean package -DskipTests

      - name: Package as Linux binary
        run: |
          jpackage \
            --input target \
            --main-jar smart-farm-1.0-SNAPSHOT.jar \
            --main-class smartfarm.Launcher \
            --name "Agrilliant" \
            --type app-image \
            --dest dist \
            --vendor "Agrilliant" \
            --app-version 1.0.0 \
            --icon src/main/resources/images/logo.png \
            --module-path "javafx-jmods/javafx-jmods-${{ env.JAVAFX_VERSION }}" \
            --add-modules javafx.controls,javafx.fxml,java.sql
          # Create a .bin archive from the app-image
          cd dist && tar czf Agrilliant-1.0.0-linux.bin Agrilliant/

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: agrilliant-linux-bin
          path: dist/*.bin
